<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Objects Reference - Complete Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #326ce5 0%, #2254d4 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-bar {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .search-bar input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar input:focus {
            border-color: #326ce5;
            box-shadow: 0 0 0 3px rgba(50, 108, 229, 0.1);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: #f8f9fa;
            border-bottom: 3px solid #dee2e6;
            padding: 0 30px;
            overflow-x: auto;
        }

        .tab {
            padding: 18px 25px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #6c757d;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab:hover {
            color: #326ce5;
            background: rgba(50, 108, 229, 0.05);
        }

        .tab.active {
            color: #326ce5;
            border-bottom-color: #326ce5;
            background: white;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .objects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .object-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .object-card:hover {
            border-color: #326ce5;
            box-shadow: 0 8px 25px rgba(50, 108, 229, 0.15);
            transform: translateY(-5px);
        }

        .object-card.expanded {
            grid-column: 1 / -1;
            border-color: #326ce5;
        }

        .object-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .object-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .object-title h3 {
            font-size: 1.4em;
            color: #212529;
            margin-bottom: 5px;
        }

        .object-title .object-kind {
            font-size: 0.85em;
            color: #6c757d;
            font-weight: 500;
        }

        .object-description {
            color: #495057;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .object-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .meta-badge {
            background: #e7f3ff;
            color: #326ce5;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .object-details {
            display: none;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #e9ecef;
        }

        .object-card.expanded .object-details {
            display: block;
        }

        .details-section {
            margin-bottom: 25px;
        }

        .details-section h4 {
            color: #326ce5;
            font-size: 1.2em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .details-section h4::before {
            content: "▸";
            font-size: 0.8em;
        }

        .details-section ul {
            list-style: none;
            padding-left: 0;
        }

        .details-section li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #495057;
            line-height: 1.6;
        }

        .details-section li::before {
            content: "●";
            position: absolute;
            left: 8px;
            color: #326ce5;
            font-size: 0.7em;
        }

        .yaml-section {
            margin-top: 20px;
        }

        .yaml-toggle {
            background: #326ce5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .yaml-toggle:hover {
            background: #2254d4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(50, 108, 229, 0.3);
        }

        .yaml-content {
            display: none;
            margin-top: 15px;
            background: #282c34;
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
        }

        .yaml-content.show {
            display: block;
        }

        .yaml-header {
            background: #1e2127;
            padding: 12px 20px;
            color: #abb2bf;
            font-size: 0.9em;
            border-bottom: 1px solid #181a1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #326ce5;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #2254d4;
        }

        .copy-btn.copied {
            background: #28a745;
        }

        pre {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #abb2bf;
            white-space: pre;
        }

        .yaml-key { color: #e06c75; }
        .yaml-string { color: #98c379; }
        .yaml-number { color: #d19a66; }
        .yaml-comment { color: #5c6370; font-style: italic; }

        .related-objects {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .related-objects h4 {
            color: #495057;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .related-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-link {
            background: white;
            color: #326ce5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            text-decoration: none;
            border: 1px solid #326ce5;
            transition: all 0.2s;
        }

        .related-link:hover {
            background: #326ce5;
            color: white;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .no-results h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #6c757d;
            border-top: 2px solid #e9ecef;
        }

        @media (max-width: 768px) {
            .objects-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .tabs {
                padding: 0 15px;
            }

            .tab {
                padding: 15px 15px;
                font-size: 14px;
            }

            .tab-content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <script>

        // Initialize the page
        function init() {
            renderAllObjects();
            setupEventListeners();
        }

        function renderAllObjects() {
            Object.keys(k8sObjects).forEach(category => {
                const grid = document.getElementById(category + 'Grid');
                k8sObjects[category].forEach(obj => {
                    grid.appendChild(createObjectCard(obj));
                });
            });
        }

        function createObjectCard(obj) {
            const card = document.createElement('div');
            card.className = 'object-card';
            card.dataset.name = obj.name.toLowerCase();
            card.dataset.kind = obj.kind.toLowerCase();
            card.dataset.description = obj.description.toLowerCase();

            card.innerHTML = `
                <div class="object-header">
                    <div class="object-icon" style="background: ${obj.iconBg}">
                        ${obj.icon}
                    </div>
                    <div class="object-title">
                        <h3>${obj.name}</h3>
                        <span class="object-kind">${obj.kind}</span>
                    </div>
                </div>
                <div class="object-description">
                    ${obj.description}
                </div>
                <div class="object-meta">
                    <span class="meta-badge">Click to expand</span>
                </div>
                <div class="object-details">
                    <div class="details-section">
                        <h4>Use Cases</h4>
                        <ul>
                            ${obj.useCases.map(uc => `<li>${uc}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="details-section">
                        <h4>Key Fields</h4>
                        <ul>
                            ${obj.keyFields.map(kf => `<li><code>${kf}</code></li>`).join('')}
                        </ul>
                    </div>
                    <div class="yaml-section">
                        <button class="yaml-toggle" onclick="toggleYaml(this)">
                            📄 Show YAML Example
                        </button>
                        <div class="yaml-content">
                            <div class="yaml-header">
                                <span>${obj.name}.yaml</span>
                                <button class="copy-btn" onclick="copyYaml(this)">Copy</button>
                            </div>
                            <pre>${escapeHtml(obj.yaml)}</pre>
                        </div>
                    </div>
                    ${obj.related ? `
                        <div class="related-objects">
                            <h4>Related Objects</h4>
                            <div class="related-links">
                                ${obj.related.map(r => `<a href="#" class="related-link" onclick="searchFor('${r}'); return false;">${r}</a>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;

            card.addEventListener('click', function(e) {
                if (!e.target.closest('.yaml-toggle') && !e.target.closest('.copy-btn') && !e.target.closest('.related-link')) {
                    this.classList.toggle('expanded');
                }
            });

            return card;
        }

        function setupEventListeners() {
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                    this.classList.add('active');
                    document.getElementById(this.dataset.tab).classList.add('active');
                });
            });

            // Search
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                performSearch(searchTerm);
            });
        }

        function performSearch(term) {
            if (!term) {
                document.querySelectorAll('.object-card').forEach(card => {
                    card.style.display = 'block';
                });
                document.querySelectorAll('.no-results').forEach(el => el.remove());
                return;
            }

            let hasResults = false;

            document.querySelectorAll('.objects-grid').forEach(grid => {
                let gridHasResults = false;
                grid.querySelectorAll('.object-card').forEach(card => {
                    const matches = card.dataset.name.includes(term) ||
                                  card.dataset.kind.includes(term) ||
                                  card.dataset.description.includes(term);

                    card.style.display = matches ? 'block' : 'none';
                    if (matches) {
                        hasResults = true;
                        gridHasResults = true;
                    }
                });

                // Remove existing no-results message
                const existingMsg = grid.querySelector('.no-results');
                if (existingMsg) existingMsg.remove();

                // Add no-results message if needed
                if (!gridHasResults && grid.closest('.tab-content').classList.contains('active')) {
                    const noResults = document.createElement('div');
                    noResults.className = 'no-results';
                    noResults.innerHTML = `
                        <h3>No results found</h3>
                        <p>Try searching for: Pod, Service, Deployment, ConfigMap, etc.</p>
                    `;
                    grid.appendChild(noResults);
                }
            });
        }

        function searchFor(term) {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = term;
            performSearch(term.toLowerCase());
        }

        function toggleYaml(button) {
            const yamlContent = button.nextElementSibling;
            yamlContent.classList.toggle('show');
            button.textContent = yamlContent.classList.contains('show') ?
                '📄 Hide YAML Example' : '📄 Show YAML Example';
        }

        function copyYaml(button) {
            const pre = button.closest('.yaml-content').querySelector('pre');
            navigator.clipboard.writeText(pre.textContent).then(() => {
                button.textContent = 'Copied!';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
