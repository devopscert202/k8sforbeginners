apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: websites.example.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.12.0
spec:
  group: example.com
  names:
    kind: Website
    listKind: WebsiteList
    plural: websites
    singular: website
    shortNames:
    - ws
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    subresources:
      status: {}
      scale:
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
    additionalPrinterColumns:
    - name: Domain
      type: string
      jsonPath: .spec.domain
    - name: Framework
      type: string
      jsonPath: .spec.framework
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Status
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: Website is a custom resource for deploying websites
        type: object
        required:
        - spec
        properties:
          spec:
            description: WebsiteSpec defines the desired state of Website
            type: object
            required:
            - domain
            - framework
            properties:
              domain:
                type: string
                minLength: 1
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                description: Valid domain name for the website
              framework:
                type: string
                enum:
                - nginx
                - apache
                - nodejs
                - python
                default: nginx
                description: Web server framework to use
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                default: 1
                description: Number of pod replicas (1-10)
              tlsEnabled:
                type: boolean
                default: false
                description: Enable TLS/HTTPS
          status:
            description: WebsiteStatus defines the observed state of Website
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Running
                - Failed
                description: Current phase of the website
              replicas:
                type: integer
                description: Total number of pod replicas
              availableReplicas:
                type: integer
                description: Number of available pod replicas
              url:
                type: string
                description: Access URL for the website
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - type
                  - status
                  properties:
                    type:
                      type: string
                      description: Type of condition
                    status:
                      type: string
                      description: Status of the condition (True, False, Unknown)
                    lastTransitionTime:
                      type: string
                      format: date-time
                      description: Last time the condition transitioned
                    reason:
                      type: string
                      description: Machine-readable reason for the condition
                    message:
                      type: string
                      description: Human-readable message
