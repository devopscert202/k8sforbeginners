# 2) PersistentVolume (cluster-scoped; no namespace)
# Update `volumeHandle` to match an existing Google Compute Engine Persistent Disk:
# projects/PROJECT_ID/zones/ZONE/disks/DISK_NAME
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysqldbstorage-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  storageClassName: ""
  csi:
    driver: pd.csi.storage.gke.io
    fsType: ext4
    volumeHandle: projects/app-cloud-dns/zones/asia-south1-a/disks/mysqldisk
---  
# 3) PersistentVolumeClaim (namespaced)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysqldbstorage-pvc
  namespace: default
spec:
  storageClassName: ""
  volumeName: mysqldbstorage-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 4) Deployment (namespaced) using the PVC as storage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-mysqldb
  namespace: default
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:5.6
          envFrom:
            - configMapRef:
                name: mysql-config
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysqldata
              mountPath: /var/lib/mysql
      volumes:
        - name: mysqldata
          persistentVolumeClaim:
            claimName: mysqldbstorage-pvc
