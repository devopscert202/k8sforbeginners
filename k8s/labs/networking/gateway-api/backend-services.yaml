---
# Deployment for App3 (Nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3-nginx
  labels:
    app: app3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
# Service for App3
apiVersion: v1
kind: Service
metadata:
  name: app3-service
  labels:
    app: app3
spec:
  selector:
    app: app3
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
