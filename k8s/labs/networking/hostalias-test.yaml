# Lab 45 Exercise 6: Pod with hostAliases for custom /etc/hosts entries
apiVersion: v1
kind: Pod
metadata:
  name: hostalias-test
spec:
  hostAliases:
  - ip: "127.0.0.1"
    hostnames:
    - "myapp.local"
  - ip: "192.168.1.100"
    hostnames:
    - "database.internal"
    - "db.internal"
  containers:
  - name: test
    image: busybox:1.36
    command: ["sleep", "3600"]
