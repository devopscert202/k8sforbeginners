# Lab 56 Exercise 7: Intentionally broken DNS client for troubleshooting
# Points to a non-existent nameserver to simulate DNS failure
apiVersion: v1
kind: Pod
metadata:
  name: dns-broken-client
  namespace: lab56-dns
spec:
  dnsPolicy: "None"
  dnsConfig:
    nameservers:
      - "203.0.113.255"
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
