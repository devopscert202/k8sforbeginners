# Lab 56 Exercise 3: ClusterIP Service with Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: lab56-dns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-svc
  namespace: lab56-dns
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
