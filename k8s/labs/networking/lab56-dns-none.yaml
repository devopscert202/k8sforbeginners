# Lab 56 Exercise 6: Pod with dnsPolicy None (fully custom resolver)
apiVersion: v1
kind: Pod
metadata:
  name: dns-none-custom
  namespace: lab56-dns
spec:
  dnsPolicy: "None"
  dnsConfig:
    nameservers:
      - "8.8.8.8"
    searches:
      - "custom.local"
    options:
      - name: ndots
        value: "2"
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
