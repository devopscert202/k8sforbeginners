# Lab 57 Exercise 5: Cross-namespace workloads (team-a client, team-b API)
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: team-b
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: team-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: team-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: toolbox
          image: busybox:1.36
          command: ["sleep", "3600"]
