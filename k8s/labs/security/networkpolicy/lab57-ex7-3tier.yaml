# Lab 57 Exercise 7: Complete 3-tier application (fe/be/db)
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: netpol-lab
spec:
  selector:
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: netpol-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
---
apiVersion: v1
kind: Service
metadata:
  name: be
  namespace: netpol-lab
spec:
  selector:
    tier: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  namespace: netpol-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: backend
  template:
    metadata:
      labels:
        tier: backend
    spec:
      containers:
        - name: api
          image: nginx:1.25-alpine
        - name: probe
          image: busybox:1.36
          command: ['sleep', '3600']
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: netpol-lab
spec:
  selector:
    tier: database
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: netpol-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: database
  template:
    metadata:
      labels:
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: labpass
