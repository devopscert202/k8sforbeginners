# To create the TLS secret, first generate a self-signed certificate:
#
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=myapp.example.com/O=MyOrg"
#
#   kubectl create secret tls myapp-tls \
#     --cert=tls.crt --key=tls.key
#
# Or use this manifest after base64-encoding the cert and key:
apiVersion: v1
kind: Secret
metadata:
  name: myapp-tls
type: kubernetes.io/tls
data:
  # Replace with your base64-encoded certificate and key
  tls.crt: LS0tLS1CRUdJTi4uLg==
  tls.key: LS0tLS1CRUdJTi4uLg==
