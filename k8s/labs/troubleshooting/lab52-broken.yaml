apiVersion: v1
kind: Namespace
metadata:
  name: lab52-capstone
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-web
  namespace: lab52-capstone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capstone
  template:
    metadata:
      labels:
        app: capstone
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=capstone-fixed"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: capstone-svc
  namespace: lab52-capstone
spec:
  selector:
    app: capstone-svc
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lab52-capstone
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: v1
kind: Pod
metadata:
  name: jumper
  namespace: lab52-capstone
  labels:
    role: jumper
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ["sleep", "3600"]
