apiVersion: v1
kind: Pod
metadata:
  name: pod-b
  namespace: lab52-ex3
  labels:
    app: backend
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-a
  namespace: lab52-ex3
spec:
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: lab52-ex3
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: lab52-ex3-client
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ["sleep", "3600"]
