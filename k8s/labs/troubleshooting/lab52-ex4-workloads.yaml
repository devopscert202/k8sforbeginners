apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: lab52-ex4
  labels:
    role: backend
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: lab52-ex4
  labels:
    role: frontend
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lab52-ex4
spec:
  selector:
    role: backend
  ports:
    - port: 80
      targetPort: 80
