apiVersion: v1
kind: Pod
metadata:
  name: missing-cm-pod
  labels:
    lab: "50"
    exercise: "missing-cm"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c", "env | sort && sleep 3600"]
      envFrom:
        - configMapRef:
            name: app-config-that-does-not-exist
