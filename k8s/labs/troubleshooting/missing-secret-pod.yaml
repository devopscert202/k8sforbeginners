apiVersion: v1
kind: Pod
metadata:
  name: missing-secret-pod
  labels:
    lab: "50"
    exercise: "missing-secret"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c", "echo API_KEY=$API_KEY && sleep 3600"]
      env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: api_key
