apiVersion: batch/v1
kind: CronJob
metadata:
  name: london-cronjob
spec:
  schedule: "0 9 * * 1-5"  # 9 AM weekdays
  timeZone: "Europe/London"  # UK Time
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - date; echo "Good morning from London!"
          restartPolicy: OnFailure
