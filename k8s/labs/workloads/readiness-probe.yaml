apiVersion: v1
kind: Pod
metadata:
  name: readiness-exec
  labels:
    test: readiness
spec:
  containers:
  - name: readiness
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - |
      sleep 10
      touch /tmp/ready
      sleep 3600
    readinessProbe:
      exec:
        command:
        - cat
        - /tmp/ready
      initialDelaySeconds: 5
      periodSeconds: 5
