apiVersion: v1
kind: Pod
metadata:
  name: modern-sidecar-demo
  labels:
    app: sidecar-demo
    pattern: modern-sidecar
spec:
  initContainers:
  - name: sidecar-logger
    image: busybox
    restartPolicy: Always  # New in K8s 1.28 - makes this a sidecar container
    command:
    - sh
    - -c
    - |
      echo "Sidecar logger starting..."
      while true; do
        echo "[$(date)] Sidecar is running" >> /shared/sidecar.log
        sleep 5
      done
    volumeMounts:
    - name: shared-logs
      mountPath: /shared

  containers:
  - name: main-app
    image: nginx
    ports:
    - containerPort: 80
      name: http
    volumeMounts:
    - name: shared-logs
      mountPath: /usr/share/nginx/html

  volumes:
  - name: shared-logs
    emptyDir: {}
