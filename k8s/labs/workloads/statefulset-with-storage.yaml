apiVersion: v1
kind: Service
metadata:
  name: nginx-storage
  labels:
    app: nginx-storage
spec:
  clusterIP: None  # Headless Service
  selector:
    app: nginx-storage
  ports:
  - port: 80
    name: web
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web-storage
  labels:
    app: nginx-storage
spec:
  serviceName: "nginx-storage"
  replicas: 3
  selector:
    matchLabels:
      app: nginx-storage
  template:
    metadata:
      labels:
        app: nginx-storage
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
          name: web
        volumeMounts:
        - name: www
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
  # volumeClaimTemplates creates a PVC for each Pod
  # PVCs are named: <volume-name>-<pod-name>
  # Example: www-web-storage-0, www-web-storage-1, www-web-storage-2
  volumeClaimTemplates:
  - metadata:
      name: www
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ""  # Use default storage class (empty string = default)
      resources:
        requests:
          storage: 1Gi
